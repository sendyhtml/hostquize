<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HOST QUIZ</title>
    <style>
        /* ===== RESET & VARIABEL ===== */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --bg-primary: #0a0e1a;
            --bg-secondary: #0f1524;
            --text-primary: #00ff9d;
            --text-secondary: #6c7a96;
            --accent: #ff3b6f;
            --accent-glow: rgba(255, 59, 111, 0.3);
            --terminal-green: #00ff9d;
            --terminal-blue: #3b8eff;
            --terminal-purple: #9d3bff;
            --terminal-gold: #ffd700;
            --border-color: #1e2638;
            --font-mono: 'Courier New', monospace;
        }

        body {
            background: var(--bg-primary);
            color: var(--text-primary);
            font-family: var(--font-mono);
            min-height: 100vh;
            position: relative;
            overflow-x: hidden;
            line-height: 1.5;
        }

        /* ===== CRT EFFECT ===== */
        body::before {
            content: "";
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(rgba(0,255,157,0.02) 50%, rgba(0,0,0,0.1) 50%);
            background-size: 100% 4px;
            pointer-events: none;
            z-index: 1000;
            animation: scan 10s linear infinite;
        }

        @keyframes scan {
            0% { transform: translateY(-100%); }
            100% { transform: translateY(100%); }
        }

        /* ===== GRAIN ===== */
        body::after {
            content: "";
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: url('data:image/svg+xml;base64,PHN2ZyB4bWxucz0iaHR0cDovL3d3dy53My5vcmcvMjAwMC9zdmciIHdpZHRoPSIzMDAiIGhlaWdodD0iMzAwIj48ZmlsdGVyIGlkPSJmIj48ZmVUdXJidWxlbmNlIHR5cGU9ImZyYWN0YWxOb2lzZSIgYmFzZUZyZXF1ZW5jeT0iLjc0IiBudW1PY3RhdmVzPSIzIiAvPjwvZmlsdGVyPjxyZWN0IHdpZHRoPSIxMDAlIiBoZWlnaHQ9IjEwMCUiIGZpbHRlcj0idXJsKCNmKSIgb3BhY2l0eT0iMC4wNCIgLz48L3N2Zz4=');
            pointer-events: none;
            opacity: 0.15;
            z-index: 999;
        }

        .container {
            max-width: 1000px;
            margin: 0 auto;
            padding: 20px;
            position: relative;
            z-index: 2;
        }

        /* ===== HEADER TERMINAL ===== */
        .terminal-header {
            background: #000000;
            border: 2px solid var(--terminal-green);
            border-radius: 12px 12px 0 0;
            padding: 15px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 15px;
            position: relative;
            box-shadow: 0 -5px 20px rgba(0,255,157,0.1);
        }

        .terminal-header::before {
            content: "● ● ●";
            position: absolute;
            top: 5px;
            left: 20px;
            color: var(--text-secondary);
            font-size: 12px;
            letter-spacing: 5px;
        }

        .path {
            color: var(--terminal-blue);
            margin-top: 15px;
        }
        .path span { color: var(--text-secondary); }
        .path::before {
            content: "~/$";
            color: var(--terminal-green);
            margin-right: 10px;
        }

        .key-panel {
            background: rgba(0,255,157,0.05);
            border: 1px solid var(--terminal-green);
            border-radius: 8px;
            padding: 10px 20px;
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .key-panel .count {
            font-size: 1.8rem;
            font-weight: bold;
            color: var(--terminal-green);
            text-shadow: 0 0 15px var(--terminal-green);
        }

        .key-btn {
            background: transparent;
            border: 2px solid var(--terminal-purple);
            color: var(--terminal-purple);
            padding: 8px 20px;
            border-radius: 6px;
            cursor: pointer;
            font-weight: bold;
            font-family: inherit;
            transition: all 0.3s;
        }
        .key-btn:hover:not(:disabled) {
            border-color: var(--terminal-green);
            color: var(--terminal-green);
            box-shadow: 0 0 20px rgba(0,255,157,0.3);
        }
        .key-btn:disabled {
            opacity: 0.3;
            cursor: not-allowed;
        }

        /* ===== QUIZ AREA ===== */
        .quiz-area {
            background: var(--bg-secondary);
            border: 2px solid var(--border-color);
            border-top: none;
            border-radius: 0 0 12px 12px;
            padding: 40px;
            margin-bottom: 20px;
        }

        .level-info {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 30px;
            padding-bottom: 15px;
            border-bottom: 1px dashed var(--border-color);
        }

        .level-badge {
            background: linear-gradient(135deg, var(--terminal-purple), var(--terminal-blue));
            padding: 8px 20px;
            border-radius: 30px;
            font-weight: bold;
            font-size: 0.9rem;
            letter-spacing: 2px;
        }

        .category {
            color: var(--terminal-gold);
        }
        .category::before {
            content: "📚";
            margin-right: 5px;
        }

        /* ===== SMART CONTAINER ===== */
        .smart-container {
            background: #000000;
            border: 2px solid var(--border-color);
            border-radius: 12px;
            padding: 30px;
            margin-bottom: 30px;
            position: relative;
            overflow: hidden;
            min-height: 200px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }

        .smart-container::before {
            content: "🧠 SMART ZONE 🧠";
            position: absolute;
            top: 10px;
            left: 20px;
            color: var(--text-secondary);
            font-size: 0.7rem;
            opacity: 0.5;
        }

        .smart-emoji {
            font-size: 6rem;
            line-height: 1;
            margin-bottom: 15px;
            filter: drop-shadow(0 0 20px rgba(255,215,0,0.3));
            animation: smartFloat 4s ease-in-out infinite;
        }

        @keyframes smartFloat {
            0%,100% { transform: translateY(0); }
            25% { transform: translateY(-8px); }
            75% { transform: translateY(8px); }
        }

        .smart-title {
            color: var(--terminal-gold);
            font-size: 1rem;
            letter-spacing: 1px;
        }

        /* ===== QUESTION ===== */
        .question-text {
            font-size: 1.2rem;
            line-height: 1.6;
            margin-bottom: 25px;
            padding: 15px;
            background: rgba(0,0,0,0.3);
            border-left: 4px solid var(--terminal-gold);
            border-radius: 4px;
        }

        /* ===== KEY REVEAL ===== */
        .key-reveal {
            background: #000000;
            border: 2px solid var(--terminal-gold);
            border-radius: 8px;
            padding: 20px;
            margin-bottom: 25px;
            display: none;
            position: relative;
        }
        .key-reveal.visible {
            display: block;
            animation: reveal 0.5s ease;
        }
        @keyframes reveal {
            from { opacity: 0; transform: translateY(-20px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .key-reveal::before {
            content: "🔑 KEY ACCESS GRANTED";
            position: absolute;
            top: -12px;
            left: 20px;
            background: #000000;
            padding: 0 15px;
            color: var(--terminal-gold);
            font-size: 0.8rem;
            border: 1px solid var(--terminal-gold);
            border-radius: 20px;
        }
        .answer-hidden {
            font-size: 1.3rem;
            text-align: center;
            color: var(--terminal-gold);
            word-break: break-word;
        }

        /* ===== INPUT AREA ===== */
        .input-area {
            margin-top: 30px;
        }
        .terminal-input {
            width: 100%;
            padding: 15px 20px;
            background: #000000;
            border: 2px solid var(--border-color);
            border-radius: 8px;
            color: var(--terminal-green);
            font-size: 1rem;
            margin-bottom: 15px;
            font-family: inherit;
        }
        .terminal-input:focus {
            outline: none;
            border-color: var(--terminal-gold);
            box-shadow: 0 0 15px rgba(255,215,0,0.2);
        }
        .btn-execute {
            width: 100%;
            padding: 15px;
            background: transparent;
            border: 2px solid var(--terminal-gold);
            color: var(--terminal-gold);
            font-size: 1.1rem;
            font-weight: bold;
            border-radius: 8px;
            cursor: pointer;
            font-family: inherit;
            transition: all 0.3s;
        }
        .btn-execute:hover {
            background: rgba(255,215,0,0.1);
            box-shadow: 0 0 30px rgba(255,215,0,0.3);
        }

        /* ===== FEEDBACK ===== */
        .feedback {
            margin-top: 20px;
            padding: 15px;
            border-radius: 6px;
            display: none;
            font-weight: bold;
        }
        .feedback.success {
            display: block;
            background: rgba(0,255,157,0.1);
            border: 2px solid var(--terminal-green);
            color: var(--terminal-green);
        }
        .feedback.error {
            display: block;
            background: rgba(255,59,111,0.1);
            border: 2px solid var(--accent);
            color: var(--accent);
        }

        /* ===== AUTO NEXT INDICATOR ===== */
        .auto-next-indicator {
            text-align: center;
            margin-top: 15px;
            color: var(--terminal-gold);
            font-size: 0.9rem;
            opacity: 0;
            transition: opacity 0.3s;
        }
        .auto-next-indicator.visible {
            opacity: 1;
        }

        /* ===== FUN FACT ===== */
        .fun-fact {
            font-size: 0.8rem;
            color: var(--text-secondary);
            margin-top: 10px;
            text-align: center;
            opacity: 0.8;
        }

        /* ===== NAVIGATION ===== */
        .nav-terminal {
            display: flex;
            gap: 15px;
            justify-content: center;
            margin-top: 30px;
        }
        .nav-link {
            background: transparent;
            border: 2px solid var(--terminal-blue);
            color: var(--terminal-blue);
            padding: 12px 30px;
            text-decoration: none;
            border-radius: 8px;
            font-weight: bold;
            transition: all 0.3s;
            cursor: pointer;
            display: inline-block;
            font-family: inherit;
        }
        .nav-link:hover:not(.disabled) {
            border-color: var(--terminal-gold);
            color: var(--terminal-gold);
            transform: translateY(-2px);
        }
        .nav-link.disabled {
            opacity: 0.3;
            cursor: not-allowed;
            pointer-events: none;
        }

        @media (max-width: 768px) {
            .quiz-area { padding: 20px; }
            .smart-emoji { font-size: 4rem; }
            .question-text { font-size: 1rem; }
        }
    </style>
</head>

            ];

            // Generate 101-120 (campuran)
            for (let i = 101; i <= 120; i++) {
                let q, a, cat, em;
                if (i % 3 === 0) {
                    q = "> Siapa nabi yang diberi mukjizat membelah bulan?";
                    a = "muhammad"; cat = "🏆 AGAMA ISLAM"; em = "🌙";
                } else if (i % 3 === 1) {
                    q = "> Negara 'Negeri Tirai Bambu'?";
                    a = "china"; cat = "🌍 IPS"; em = "🎋";
                } else {
                    q = "> Kenapa harus tersenyum?";
                    a = "biar bahagia"; cat = "😄 LUCU"; em = "😊";
                }
                smartDB.push({
                    level: i, emoji: em, title: `BONUS #${i}`, question: q, answer: a,
                    hint: "Coba tebak!", category: cat, funFact: "Teruslah belajar!"
                });
            }

            // ========== STATE ==========
            let currentLevel = 1;
            let userProgress = { keys: 5, completedLevels: [], currentLevel: 1 };
            let keyUsed = false;
            let autoNextTimer = null;

            // ========== INIT ==========
            function initialize() {
                try {
                    const saved = localStorage.getItem('hostQuiz_offline');
                    if (saved) {
                        const parsed = JSON.parse(saved);
                        userProgress = {
                            keys: parsed.keys ?? 5,
                            completedLevels: Array.isArray(parsed.completedLevels) ? parsed.completedLevels : [],
                            currentLevel: parsed.currentLevel ?? 1
                        };
                    }
                } catch (e) {}

                const urlParams = new URLSearchParams(window.location.search);
                const levelFromUrl = parseInt(urlParams.get('level'));
                if (!isNaN(levelFromUrl) && levelFromUrl >= 1 && levelFromUrl <= 120) {
                    currentLevel = levelFromUrl;
                } else {
                    currentLevel = userProgress.currentLevel || 1;
                }

                updateUI();
            }

            function updateUI() {
                const levelData = smartDB.find(l => l.level === currentLevel) || smartDB[0];
                
                document.getElementById('keyCount').textContent = userProgress.keys;
                document.getElementById('levelBadge').textContent = `LEVEL_${String(currentLevel).padStart(3,'0')}`;
                document.getElementById('category').textContent = levelData.category;
                document.getElementById('smartEmoji').textContent = levelData.emoji;
                document.getElementById('smartTitle').textContent = `"${levelData.title}"`;
                document.getElementById('questionText').textContent = levelData.question;
                document.getElementById('funFact').textContent = `"${levelData.funFact}"`;
                document.getElementById('answerInput').value = '';
                document.getElementById('keyReveal').classList.remove('visible');
                document.getElementById('feedback').className = 'feedback';
                document.getElementById('autoNextIndicator').classList.remove('visible');
                
                keyUsed = false;
                document.getElementById('useKeyBtn').disabled = userProgress.keys <= 0;

                document.getElementById('prevBtn').classList.toggle('disabled', currentLevel <= 1);
                document.getElementById('nextBtn').classList.toggle('disabled', currentLevel >= 120);

                // Update URL
                const url = new URL(window.location);
                url.searchParams.set('level', currentLevel);
                window.history.replaceState({}, '', url);
            }

            function saveProgress() {
                try {
                    localStorage.setItem('hostQuiz_offline', JSON.stringify(userProgress));
                } catch (e) {}
            }

            function checkAnswer() {
                const userAnswer = document.getElementById('answerInput').value.toLowerCase().trim();
                const levelData = smartDB.find(l => l.level === currentLevel);
                if (!levelData) return;

                const isCorrect = userAnswer.includes(levelData.answer.toLowerCase());
                const feedback = document.getElementById('feedback');

                if (isCorrect) {
                    feedback.className = 'feedback success';
                    feedback.textContent = '✓ PINTAR! Jawaban benar! +10 Ilmu!';

                    if (!userProgress.completedLevels.includes(currentLevel)) {
                        userProgress.completedLevels.push(currentLevel);
                        if (currentLevel < 120) {
                            userProgress.currentLevel = currentLevel + 1;
                        }
                        saveProgress();
                    }

                    document.getElementById('autoNextIndicator').classList.add('visible');
                    if (autoNextTimer) clearTimeout(autoNextTimer);
                    autoNextTimer = setTimeout(() => {
                        if (currentLevel < 120) {
                            navigate(1);
                        } else {
                            window.location.href = 'index.html?completed=120';
                        }
                    }, 1500);
                } else {
                    feedback.className = 'feedback error';
                    feedback.textContent = '✗ BELUM TEPAT! Coba lagi!';
                    document.getElementById('autoNextIndicator').classList.remove('visible');
                }
            }

            function useKey() {
                if (userProgress.keys <= 0) {
                    alert('[!] KEYS HABIS! Kembali ke dashboard untuk claim.');
                    return;
                }
                if (keyUsed) {
                    alert('[!] Key sudah dipakai di level ini.');
                    return;
                }

                const levelData = smartDB.find(l => l.level === currentLevel);
                if (!levelData) return;

                userProgress.keys--;
                saveProgress();
                
                const hintText = levelData.hint ? ` (Petunjuk: ${levelData.hint})` : '';
                document.getElementById('keyAnswer').textContent = levelData.answer + hintText;
                document.getElementById('keyReveal').classList.add('visible');
                document.getElementById('useKeyBtn').disabled = true;
                document.getElementById('keyCount').textContent = userProgress.keys;
                keyUsed = true;
            }

            function navigate(direction) {
                if (autoNextTimer) clearTimeout(autoNextTimer);
                const newLevel = currentLevel + direction;
                if (newLevel >= 1 && newLevel <= 120) {
                    currentLevel = newLevel;
                    updateUI();
                }
            }

            // ========== EVENT LISTENERS ==========
            document.getElementById('useKeyBtn').addEventListener('click', useKey);
            document.getElementById('checkAnswerBtn').addEventListener('click', checkAnswer);
            document.getElementById('answerInput').addEventListener('keypress', (e) => {
                if (e.key === 'Enter') {
                    e.preventDefault();
                    checkAnswer();
                }
            });
            document.getElementById('prevBtn').addEventListener('click', () => navigate(-1));
            document.getElementById('nextBtn').addEventListener('click', () => navigate(1));

            document.addEventListener('keydown', (e) => {
                if (e.key === 'ArrowLeft') navigate(-1);
                else if (e.key === 'ArrowRight') navigate(1);
            });

            // ========== START ==========
            initialize();
        })();
    </script>
